spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crypto_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
logging.level.org.flywaydb=DEBUG

logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

server.port=8081

jwt.secret=${JWT_SECRET:984hg493gh0439rthr0429uruj2309yh937gc763fe87t3f89723gf}
jwt.expiration=${JWT_EXPIRATION:604800000}

spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true

testing.app.secret=MySuperSecureAndLongEnoughSecretKeyWithAtLeast64Characters1234567890111111111111111111111111111
testing.app.lifetime=604800000

currencyfreaks.apikey=${CURRENCYFREAKS_APIKEY:CHANGE_ME}

coinmarketcap.api.url=${COINMARKETCAP_API_URL:https://pro-api.coinmarketcap.com/v1}
coinmarketcap.api.key=${COINMARKETCAP_API_KEY:CHANGE_ME}

crypto.sell.discount.percent=${CRYPTO_SELL_DISCOUNT_PERCENT:15}
