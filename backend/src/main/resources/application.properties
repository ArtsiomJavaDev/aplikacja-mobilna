spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crypto_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
logging.level.org.flywaydb=DEBUG

logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.example.security=DEBUG

server.port=8081
server.address=0.0.0.0

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:604800000}

spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost,http://localhost:8082}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true

testing.app.secret=${TESTING_APP_SECRET}
testing.app.lifetime=${TESTING_APP_LIFETIME:604800000}

currencyfreaks.apikey=${CURRENCYFREAKS_APIKEY:CHANGE_ME}


crypto.sell.discount.percent=${CRYPTO_SELL_DISCOUNT_PERCENT:15}

newsapi.key=${NEWSAPI_KEY}

gemini.api.key=${GEMINI_API_KEY}

